name = "log-mcp-vault"
main = "index.js"
compatibility_date = "2024-01-01"
workers_dev = true

[vars]
PROVIDER_ENDPOINT = "https://api.deepseek.com/v1/chat/completions"

# Replace these in .dev.vars (local) or Worker secrets (prod)
# API_KEY = "your-deepseek-key"

# KV for PII mappings (auto-expiry)
[[kv_namespaces]]
binding = "PII_MAP"
id = "ec30e1720b814b919657f651ba6bb999"

# D1 for persistent vault storage
[[d1_databases]]
binding = "LOG_VAULT"
database_name = "log-vault"
database_id = "d08d40bc-7bc8-4b26-89b9-d4d388dd498a"

# Vectorize for semantic search
[[vectorize]]
binding = "VECTORIZE"
index_name = "log-embeddings"
