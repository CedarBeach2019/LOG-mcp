<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LOG-mcp</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface-2:#1a1a28;
  --accent:#7c5cff;--accent-dim:#5a3fcc;
  --text:#e8e8f0;--text-muted:#8888a0;
  --user-bg:#7c5cff;--user-text:#fff;
  --asst-bg:#1a1a28;--asst-text:#e8e8f0;
  --border:#2a2a3a;--error:#ff4466;--success:#44dd88;
  --radius:16px;--radius-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
#login-screen{display:flex;align-items:center;justify-content:center;height:100%;padding:24px;background:radial-gradient(ellipse at 50% 40%,#16162a 0%,var(--bg) 70%)}
.login-card{width:100%;max-width:380px;padding:48px 36px;background:var(--surface);border:1px solid var(--border);border-radius:20px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.login-logo{width:56px;height:56px;margin:0 auto 20px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:700;box-shadow:0 4px 24px rgba(124,92,255,.35)}
.login-card h1{font-size:22px;font-weight:600;margin-bottom:6px}
.login-card p{color:var(--text-muted);font-size:14px;margin-bottom:32px}
#passphrase{width:100%;padding:14px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
#passphrase:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,.15)}
#passphrase::placeholder{color:var(--text-muted)}
#login-btn{width:100%;padding:14px;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
#login-btn:hover{background:var(--accent-dim)}
#login-btn:active{transform:scale(.98)}
#login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-error{color:var(--error);font-size:13px;margin-top:12px;min-height:20px}
#chat-screen{display:none;flex-direction:column;height:100%}
#chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
#chat-header h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:10px}
.header-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0}
.header-actions{display:flex;align-items:center;gap:8px}
.hdr-btn{background:none;border:1px solid var(--border);color:var(--text-muted);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0}
.hdr-btn:hover{border-color:var(--text-muted);color:var(--text)}
#privacy-btn.privacy-on{color:var(--success);border-color:rgba(68,221,136,.3)}
#privacy-btn.privacy-off{color:var(--error);border-color:rgba(255,68,102,.3)}
#logout-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--font);transition:all .2s}
#logout-btn:hover{border-color:var(--error);color:var(--error)}

/* Settings */
#settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
#settings-overlay.open{opacity:1;pointer-events:auto}
#settings-panel{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:90vw;background:var(--surface);z-index:101;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.4)}
#settings-panel.open{transform:translateX(0)}
.sp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.sp-header h2{font-size:16px;font-weight:600}
.sp-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sp-close:hover{background:var(--surface-2);color:var(--text)}
.sp-body{flex:1;overflow-y:auto;padding:16px 20px}
.sp-body::-webkit-scrollbar{width:4px}
.sp-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sp-section{margin-bottom:24px}
.sp-section h3{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.pf-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface-2);border-radius:8px;margin-bottom:6px}
.pf-key{font-size:13px;font-weight:500;color:var(--accent);min-width:90px;word-break:break-all}
.pf-val{flex:1;font-size:13px;color:var(--text);cursor:pointer;padding:4px 8px;border-radius:4px;min-height:24px;transition:background .15s}
.pf-val:hover{background:rgba(255,255,255,.05)}
.pf-edit{flex:1;padding:4px 8px;background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.pf-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;opacity:.5;transition:all .15s;padding:2px}
.pf-del:hover{opacity:1;color:var(--error)}
.sp-add{width:100%;padding:10px;margin-top:6px;background:rgba(124,92,255,.1);border:1px dashed rgba(124,92,255,.3);color:var(--accent);border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font);transition:all .2s}
.sp-add:hover{background:rgba(124,92,255,.15);border-color:var(--accent)}
.rt-item{padding:8px 12px;background:var(--surface-2);border-radius:8px;margin-bottom:6px;font-size:13px}
.rt-item .rt-label{font-weight:500;color:var(--text);margin-bottom:2px}
.rt-item .rt-desc{color:var(--text-muted);font-size:12px}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:6px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.msg-row{display:flex;flex-direction:column;max-width:85%;animation:msgIn .25s ease-out}
.msg-row.user{align-self:flex-end;align-items:flex-end}
.msg-row.assistant{align-self:flex-start;align-items:flex-start}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-bubble{padding:12px 16px;border-radius:var(--radius);font-size:14.5px;line-height:1.65;word-wrap:break-word;overflow-wrap:break-word}
.msg-row.user .msg-bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:4px}
.msg-row.assistant .msg-bubble{background:var(--asst-bg);color:var(--asst-text);border-bottom-left-radius:4px}

/* Route badge */
.route-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:10px;margin-bottom:4px;font-weight:500}
.route-badge.fast{background:rgba(68,221,136,.12);color:#44dd88}
.route-badge.deep{background:rgba(168,85,247,.12);color:#a855f7}
.route-badge.compare{background:rgba(59,130,246,.12);color:#60a5fa}
.route-badge.draft{background:rgba(255,170,50,.15);color:#ffaa32}
.route-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-muted);margin-bottom:6px}
.route-model{font-family:var(--mono);font-size:11px}
.route-conf{opacity:.7}

/* Feedback */
.msg-feedback{display:flex;align-items:center;gap:4px;margin-top:6px;padding:0 2px}
.fb-btn{background:none;border:none;cursor:pointer;font-size:15px;opacity:.3;transition:all .15s;padding:2px 4px;border-radius:4px;line-height:1}
.fb-btn:hover{opacity:.65}
.fb-btn.active-up{opacity:1}
.fb-btn.active-down{opacity:1}
.fb-critique{display:none;margin-top:6px;width:100%}
.fb-critique.visible{display:flex;gap:6px;align-items:flex-end}
.fb-critique input{flex:1;padding:6px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:var(--font);outline:none}
.fb-critique input:focus{border-color:var(--accent)}
.fb-critique button{padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font);white-space:nowrap}

.msg-time{font-size:11px;color:var(--text-muted);margin-top:4px;padding:0 4px}
.msg-row.user .msg-time{text-align:right}
.msg-row.assistant .msg-time{text-align:left}

/* Markdown */
.msg-bubble p{margin:0 0 8px}
.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble strong{font-weight:600}
.msg-bubble a{color:#a78bfa;text-decoration:none}
.msg-bubble a:hover{text-decoration:underline}
.msg-bubble code:not(.block-code){background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:13px}
.code-block{background:#0d0d15;border:1px solid var(--border);border-radius:8px;margin:8px 0;overflow:hidden}
.code-header{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);font-size:12px;color:var(--text-muted)}
.code-header button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;font-family:var(--font)}
.code-header button:hover{color:var(--text)}
.code-block pre{padding:14px;margin:0;overflow-x:auto;font-family:var(--mono);font-size:13px;line-height:1.5;color:#c8c8e0}
.code-block pre::-webkit-scrollbar{height:4px}
.code-block pre::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg-status{font-size:12px;color:var(--text-muted);font-style:italic;padding:4px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);text-align:center;gap:12px;padding:40px}
.empty-state .icon{font-size:40px;opacity:.4}
.empty-state p{font-size:14px;max-width:280px}

/* Draft mode */
.draft-container{align-self:flex-start;width:100%;max-width:600px;margin:8px 0;animation:msgIn .3s ease-out}
.draft-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:var(--text-muted)}
.draft-header .draft-title{font-weight:600;color:var(--text);font-size:14px}
.draft-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative}
.draft-card:hover{border-color:#3a3a5a;background:#14141f}
.draft-card.ranked{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 2px 12px rgba(124,92,255,.15)}
.draft-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.draft-profile{font-size:11px;padding:2px 10px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.draft-profile.precise{background:rgba(59,130,246,.15);color:#60a5fa}
.draft-profile.creative{background:rgba(68,221,136,.15);color:#44dd88}
.draft-profile.deep{background:rgba(168,85,247,.15);color:#a855f7}
.draft-profile.fast{background:rgba(255,170,50,.15);color:#ffaa32}
.draft-model{font-size:11px;color:var(--text-muted);font-family:var(--mono)}
.draft-latency{font-size:11px;color:var(--text-muted);margin-left:auto}
.draft-rank{width:26px;height:26px;border-radius:50%;background:var(--surface-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-muted);flex-shrink:0;transition:all .2s}
.draft-card.ranked .draft-rank{background:var(--accent);border-color:var(--accent);color:#fff}
.draft-text{font-size:13.5px;line-height:1.6;color:var(--text);overflow:hidden;transition:max-height .3s ease;max-height:3.2em}
.draft-text.expanded{max-height:none}
.draft-text-toggle{font-size:11px;color:var(--accent);cursor:pointer;margin-top:4px;display:none}
.draft-text.needs-expand+.draft-text-toggle{display:inline}
.draft-card.ranked-1{border-color:#fbbf24;box-shadow:0 0 0 1px #fbbf24,0 2px 16px rgba(251,191,36,.15)}
.draft-card.ranked-1 .draft-rank{background:#fbbf24;border-color:#fbbf24;color:#000}
.draft-reasoning{display:flex;gap:8px;align-items:flex-end;margin-top:12px}
.draft-reasoning input{flex:1;padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .2s}
.draft-reasoning input:focus{border-color:var(--accent)}
.draft-reasoning input::placeholder{color:var(--text-muted)}
.elaborate-btn{width:100%;padding:12px;margin-top:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;display:none}
.elaborate-btn.visible{display:block;animation:msgIn .2s ease-out}
.elaborate-btn:hover{background:var(--accent-dim);transform:translateY(-1px)}
.elaborate-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.draft-loading{text-align:center;padding:20px;font-size:14px;color:var(--text-muted);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* Input */
#input-area{padding:16px 20px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
#connection-label{font-size:11px;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
#connection-label .dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
#input-wrap{display:flex;gap:10px;align-items:flex-end;max-width:720px;margin:0 auto}
#message-input{flex:1;padding:12px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:15px;outline:none;resize:none;min-height:44px;max-height:160px;line-height:1.5;transition:border-color .2s}
#message-input:focus{border-color:var(--accent)}
#message-input::placeholder{color:var(--text-muted)}
#send-btn{width:44px;height:44px;flex-shrink:0;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s,opacity .2s}
#send-btn:hover{background:var(--accent-dim)}
#send-btn:active{transform:scale(.93)}
#send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
#send-btn svg{width:20px;height:20px}
.btn-group{display:flex;gap:6px;align-items:flex-end}
#draft-btn{width:44px;height:44px;flex-shrink:0;background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
#draft-btn:hover{border-color:var(--accent);color:var(--accent)}
#draft-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(124,92,255,.3)}
#footer{text-align:center;padding:8px 20px 12px;font-size:11px;color:var(--text-muted);flex-shrink:0;opacity:.5}
@media(max-width:600px){
  .login-card{padding:36px 24px}
  .msg-row{max-width:92%}
  .draft-container{max-width:95%}
  #chat-header{padding:12px 16px}
  #messages{padding:14px}
  #input-area{padding:12px 16px}
  .pf-key{min-width:60px;font-size:12px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">L</div>
    <h1>Welcome to LOG-mcp</h1>
    <p>Enter your passphrase to continue</p>
    <input type="password" id="passphrase" placeholder="Passphrase" autocomplete="off" autofocus>
    <button id="login-btn">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="chat-screen">
  <div id="chat-header">
    <h1><span class="header-dot"></span>LOG-mcp</h1>
    <div class="header-actions">
      <button id="privacy-btn" class="hdr-btn privacy-on" title="Privacy mode">🔒</button>
      <button id="settings-btn" class="hdr-btn" title="Settings">⚙️</button>
      <button id="logout-btn">Sign out</button>
    </div>
  </div>
  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">💬</div>
      <p>Start a conversation. Your messages are processed locally via LOG-mcp.</p>
    </div>
  </div>
  <div id="input-area">
    <div id="connection-label"><span class="dot"></span>Connected</div>
    <div id="input-wrap">
      <textarea id="message-input" placeholder="Type a message… (/draft for draft mode)" rows="1"></textarea>
      <div class="btn-group">
        <button id="draft-btn" title="Draft mode (generate multiple options)">🎯</button>
        <button id="send-btn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
  </div>
  <div id="footer">Powered by LOG-mcp</div>
</div>

<div id="settings-overlay"></div>
<div id="settings-panel">
  <div class="sp-header"><h2>Settings</h2><button class="sp-close" id="settings-close">✕</button></div>
  <div class="sp-body">
    <div class="sp-section"><h3>Preferences</h3><div id="prefs-list"></div><button class="sp-add" id="prefs-add">+ Add preference</button></div>
    <div class="sp-section"><h3>Routing</h3><div id="routing-info"></div></div>
  </div>
</div>

<script>
(() => {
  const API = '';
  const $ = s => document.querySelector(s);
  let token = sessionStorage.getItem('token');
  let chatHistory = [];
  let sending = false;
  let privacyMode = localStorage.getItem('privacy_mode') !== 'off';

  // ── Draft state ──
  let draftMode = false;
  let drafts = [];
  let draftRanking = []; // array of draft indices in rank order
  let draftInteractionId = null;
  let draftContainer = null;

  const els = {
    loginScreen: $('#login-screen'), chatScreen: $('#chat-screen'),
    passphrase: $('#passphrase'), loginBtn: $('#login-btn'), loginError: $('#login-error'),
    messages: $('#messages'), emptyState: $('#empty-state'),
    input: $('#message-input'), sendBtn: $('#send-btn'), logoutBtn: $('#logout-btn'),
    privacyBtn: $('#privacy-btn'), settingsBtn: $('#settings-btn'),
    settingsPanel: $('#settings-panel'), settingsOverlay: $('#settings-overlay'),
    settingsClose: $('#settings-close'), prefsList: $('#prefs-list'),
    prefsAdd: $('#prefs-add'), routingInfo: $('#routing-info'),
    draftBtn: $('#draft-btn'),
  };

  // ── Draft mode toggle ──
  els.draftBtn.addEventListener('click', () => {
    draftMode = !draftMode;
    els.draftBtn.classList.toggle('active', draftMode);
    els.input.placeholder = draftMode ? '🎯 Draft mode — type your prompt…' : 'Type a message… (/draft for draft mode)';
    els.input.focus();
  });

  // ── Privacy ──
  function updatePrivacy() {
    els.privacyBtn.className = 'hdr-btn ' + (privacyMode ? 'privacy-on' : 'privacy-off');
    els.privacyBtn.textContent = privacyMode ? '🔒' : '🔓';
  }
  els.privacyBtn.addEventListener('click', () => {
    privacyMode = !privacyMode;
    localStorage.setItem('privacy_mode', privacyMode ? 'on' : 'off');
    updatePrivacy();
  });
  updatePrivacy();

  // ── Settings ──
  function openSettings() {
    els.settingsPanel.classList.add('open');
    els.settingsOverlay.classList.add('open');
    loadPrefs();
    loadRouting();
  }
  function closeSettings() {
    els.settingsPanel.classList.remove('open');
    els.settingsOverlay.classList.remove('open');
  }
  els.settingsBtn.addEventListener('click', openSettings);
  els.settingsClose.addEventListener('click', closeSettings);
  els.settingsOverlay.addEventListener('click', closeSettings);

  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Authorization': 'Bearer ' + token }
    };
    if (body !== undefined) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(API + path, opts);
    return r;
  }

  async function loadPrefs() {
    try {
      const r = await api('GET', '/v1/preferences');
      if (!r.ok) return;
      const prefs = await r.json();
      els.prefsList.innerHTML = '';
      for (const [k, v] of Object.entries(prefs)) {
        els.prefsList.appendChild(makePrefItem(k, String(v)));
      }
    } catch (e) { console.error('loadPrefs', e); }
  }

  function makePrefItem(key, value) {
    const item = document.createElement('div');
    item.className = 'pf-item';

    const keyEl = document.createElement('span');
    keyEl.className = 'pf-key';
    keyEl.textContent = key;

    const valEl = document.createElement('span');
    valEl.className = 'pf-val';
    valEl.textContent = value;
    valEl.title = 'Click to edit';

    function startEdit() {
      const inp = document.createElement('input');
      inp.className = 'pf-edit';
      inp.value = value;
      valEl.replaceWith(inp);
      inp.focus();
      inp.select();
      let saved = false;
      const finish = async () => {
        if (saved) return;
        saved = true;
        const nv = inp.value.trim();
        if (nv && nv !== value) {
          try { await api('PUT', '/v1/preferences', { key, value: nv }); } catch {}
        }
        loadPrefs();
      };
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') finish(); if (e.key === 'Escape') finish(); });
      inp.addEventListener('blur', finish);
    }
    valEl.addEventListener('click', startEdit);

    const del = document.createElement('button');
    del.className = 'pf-del';
    del.textContent = '✕';
    del.title = 'Delete';
    del.addEventListener('click', async () => {
      try { await api('DELETE', '/v1/preferences/' + encodeURIComponent(key)); } catch {}
      item.remove();
    });

    item.append(keyEl, valEl, del);
    return item;
  }

  els.prefsAdd.addEventListener('click', () => {
    const item = document.createElement('div');
    item.className = 'pf-item';
    const kInp = document.createElement('input');
    kInp.className = 'pf-edit'; kInp.style.flex = '1'; kInp.placeholder = 'Key';
    const vInp = document.createElement('input');
    vInp.className = 'pf-edit'; vInp.style.flex = '1'; vInp.placeholder = 'Value';
    const saveBtn = document.createElement('button');
    saveBtn.className = 'pf-del'; saveBtn.textContent = '✓'; saveBtn.style.cssText = 'color:var(--success);opacity:1';
    item.append(kInp, vInp, saveBtn);
    els.prefsList.insertBefore(item, els.prefsAdd);
    kInp.focus();

    let done = false;
    const doSave = async () => {
      if (done) return; done = true;
      const k = kInp.value.trim(), v = vInp.value.trim();
      if (k && v) {
        try { await api('PUT', '/v1/preferences', { key: k, value: v }); } catch {}
        loadPrefs();
      } else { item.remove(); }
    };
    saveBtn.addEventListener('click', doSave);
    kInp.addEventListener('keydown', e => { if (e.key === 'Enter') vInp.focus(); if (e.key === 'Escape') { done = true; item.remove(); } });
    vInp.addEventListener('keydown', e => { if (e.key === 'Enter') doSave(); if (e.key === 'Escape') { done = true; item.remove(); } });
  });

  async function loadRouting() {
    try {
      const r = await api('GET', '/v1/health');
      if (!r.ok) return;
      const data = await r.json();
      const rules = data.routing_rules || data.rules || [];
      els.routingInfo.innerHTML = '';
      if (!rules.length) {
        els.routingInfo.innerHTML = '<div style="color:var(--text-muted);font-size:13px">No routing rules configured</div>';
        return;
      }
      rules.forEach(rule => {
        const d = document.createElement('div');
        d.className = 'rt-item';
        const parts = [];
        if (rule.name) parts.push(rule.name);
        if (rule.pattern) parts.push('pattern: ' + rule.pattern);
        if (rule.action) parts.push('action: ' + rule.action);
        if (rule.target_model) parts.push('→ ' + rule.target_model);
        d.innerHTML = '<div class="rt-label">' + esc(rule.name || rule.pattern || 'Rule') + '</div><div class="rt-desc">' + esc(parts.filter((_, i) => i > 0).join(' · ') || 'No details') + '</div>';
        els.routingInfo.appendChild(d);
      });
    } catch (e) { console.error('loadRouting', e); }
  }

  // ── Chat ──
  els.input.addEventListener('input', () => {
    els.input.style.height = 'auto';
    els.input.style.height = Math.min(els.input.scrollHeight, 160) + 'px';
    els.sendBtn.disabled = !els.input.value.trim() || sending;
  });
  els.input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  els.sendBtn.addEventListener('click', send);

  els.logoutBtn.addEventListener('click', () => {
    sessionStorage.removeItem('token');
    token = null;
    chatHistory = [];
    els.messages.innerHTML = '';
    els.messages.appendChild(els.emptyState);
    els.emptyState.style.display = '';
    els.chatScreen.style.display = 'none';
    els.loginScreen.style.display = '';
    els.passphrase.value = '';
    els.passphrase.focus();
  });

  els.loginBtn.addEventListener('click', doLogin);
  els.passphrase.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const pw = els.passphrase.value.trim();
    if (!pw) return;
    els.loginBtn.disabled = true;
    els.loginBtn.textContent = 'Signing in…';
    els.loginError.textContent = '';
    try {
      const r = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passphrase: pw })
      });
      if (!r.ok) throw new Error((await r.json()).error || 'Authentication failed');
      const { token: t } = await r.json();
      sessionStorage.setItem('token', t);
      token = t;
      showChat();
    } catch (e) {
      els.loginError.textContent = e.message;
    } finally {
      els.loginBtn.disabled = false;
      els.loginBtn.textContent = 'Sign in';
    }
  }

  function showChat() {
    els.loginScreen.style.display = 'none';
    els.chatScreen.style.display = 'flex';
    els.input.focus();
  }

  async function send() {
    const raw = els.input.value.trim();
    if (!raw || sending || !token) return;

    // Check for /draft command
    let text = raw;
    let useDraft = draftMode;
    if (text.startsWith('/draft ')) {
      text = text.slice(7).trim();
      useDraft = true;
    }
    if (!text) return;

    sending = true;
    els.sendBtn.disabled = true;
    els.input.value = '';
    els.input.style.height = 'auto';
    hideEmpty();
    addMessage('user', raw);
    chatHistory.push({ role: 'user', content: text });

    // Turn off draft toggle after use
    if (draftMode) {
      draftMode = false;
      els.draftBtn.classList.remove('active');
      els.input.placeholder = 'Type a message… (/draft for draft mode)';
    }

    if (useDraft) {
      await sendDraft(text);
    } else {
      await sendNormal(text);
    }
  }

  async function sendNormal(text) {
    const statusEl = addStatus('Sending…');
    scrollDown();

    try {
      const r = await fetch(API + '/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ model: 'default', messages: chatHistory })
      });
      if (!r.ok) { const err = await r.json().catch(() => ({})); throw new Error(err.error || 'Error ' + r.status); }
      const data = await r.json();
      const content = data.choices?.[0]?.message?.content || '(empty response)';
      const route = data.route || {};
      const interactionId = data.interaction_id;
      statusEl.remove();
      addAssistantMessage(content, route, interactionId);
      chatHistory.push({ role: 'assistant', content });
      if (data.escalation_response) {
        addMessage('assistant', data.escalation_response);
        chatHistory.push({ role: 'assistant', content: data.escalation_response });
      }
    } catch (e) {
      statusEl.textContent = 'Error: ' + e.message;
      statusEl.style.color = 'var(--error)';
      statusEl.style.fontStyle = 'normal';
    } finally {
      sending = false;
      els.sendBtn.disabled = !els.input.value.trim();
      scrollDown();
    }
  }

  // ── Draft mode flow ──
  async function sendDraft(text) {
    const statusEl = addStatus('🎯 Generating drafts…');
    scrollDown();

    try {
      const r = await fetch(API + '/v1/drafts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ messages: chatHistory })
      });
      if (!r.ok) { const err = await r.json().catch(() => ({})); throw new Error(err.error || 'Error ' + r.status); }
      const data = await r.json();
      statusEl.remove();

      drafts = data.drafts || [];
      draftRanking = [];
      draftInteractionId = data.interaction_id || null;

      if (drafts.length === 0) {
        addMessage('assistant', 'No drafts were generated. Try a different prompt.');
        sending = false;
        els.sendBtn.disabled = !els.input.value.trim();
        return;
      }

      renderDrafts();
      scrollDown();
    } catch (e) {
      statusEl.textContent = 'Error: ' + e.message;
      statusEl.style.color = 'var(--error)';
      statusEl.style.fontStyle = 'normal';
      sending = false;
      els.sendBtn.disabled = !els.input.value.trim();
      scrollDown();
    }
  }

  function renderDrafts() {
    if (draftContainer) draftContainer.remove();

    draftContainer = document.createElement('div');
    draftContainer.className = 'draft-container';

    // Header
    const header = document.createElement('div');
    header.className = 'draft-header';
    header.innerHTML = '<span class="draft-title">🎯 Draft Round — ' + drafts.length + ' options</span><span>Click to rank, then elaborate</span>';
    draftContainer.appendChild(header);

    // Cards
    drafts.forEach((draft, i) => {
      const card = document.createElement('div');
      card.className = 'draft-card';
      card.dataset.index = i;

      const top = document.createElement('div');
      top.className = 'draft-card-top';

      const rankCircle = document.createElement('div');
      rankCircle.className = 'draft-rank';
      rankCircle.textContent = '?';

      const profile = document.createElement('span');
      profile.className = 'draft-profile ' + (draft.profile || 'precise');
      profile.textContent = draft.profile || 'precise';

      const model = document.createElement('span');
      model.className = 'draft-model';
      model.textContent = draft.model || '';

      const latency = document.createElement('span');
      latency.className = 'draft-latency';
      latency.textContent = draft.latency_ms != null ? (draft.latency_ms / 1000).toFixed(1) + 's' : '';

      top.append(rankCircle, profile, model, latency);
      card.appendChild(top);

      const textEl = document.createElement('div');
      textEl.className = 'draft-text';
      textEl.textContent = draft.response || '';
      // Check if needs expansion
      if (textEl.scrollHeight > textEl.clientHeight + 2 || (draft.response || '').length > 180) {
        textEl.classList.add('needs-expand');
      }
      card.appendChild(textEl);

      const toggle = document.createElement('span');
      toggle.className = 'draft-text-toggle';
      toggle.textContent = 'Show more';
      toggle.addEventListener('click', e => {
        e.stopPropagation();
        const expanded = textEl.classList.toggle('expanded');
        toggle.textContent = expanded ? 'Show less' : 'Show more';
      });
      card.appendChild(toggle);

      card.addEventListener('click', () => rankDraft(i));
      draftContainer.appendChild(card);
    });

    // Reasoning input
    const reasoningWrap = document.createElement('div');
    reasoningWrap.className = 'draft-reasoning';
    const reasonInput = document.createElement('input');
    reasonInput.type = 'text';
    reasonInput.placeholder = 'Optional: tell the system why this approach is better';
    reasoningWrap.appendChild(reasonInput);
    draftContainer.appendChild(reasoningWrap);

    // Elaborate button
    const elabBtn = document.createElement('button');
    elabBtn.className = 'elaborate-btn';
    elabBtn.textContent = '⏳ Rank all drafts to elaborate';
    elabBtn.disabled = true;
    elabBtn.id = 'elaborate-btn';
    draftContainer.appendChild(elabBtn);

    els.messages.appendChild(draftContainer);
    scrollDown();
  }

  function rankDraft(index) {
    if (draftRanking.includes(index)) {
      // Remove from ranking
      draftRanking = draftRanking.filter(i => i !== index);
    } else {
      draftRanking.push(index);
    }
    updateDraftUI();
  }

  function updateDraftUI() {
    if (!draftContainer) return;
    const cards = draftContainer.querySelectorAll('.draft-card');

    cards.forEach(card => {
      const idx = parseInt(card.dataset.index);
      const rank = draftRanking.indexOf(idx);
      card.classList.remove('ranked', 'ranked-1');
      const circle = card.querySelector('.draft-rank');

      if (rank >= 0) {
        card.classList.add('ranked');
        circle.textContent = rank + 1;
        if (rank === 0) card.classList.add('ranked-1');
      } else {
        circle.textContent = '?';
      }
    });

    const btn = draftContainer.querySelector('.elaborate-btn');
    if (draftRanking.length === drafts.length && drafts.length > 0) {
      const winner = drafts[draftRanking[0]];
      btn.textContent = '🏆 Elaborate #' + winner.profile;
      btn.disabled = false;
      btn.classList.add('visible');
      if (!btn._bound) {
        btn._bound = true;
        btn.addEventListener('click', doElaborate);
      }
    } else {
      const remaining = drafts.length - draftRanking.length;
      btn.textContent = remaining > 0
        ? '⏳ Rank ' + remaining + ' more draft' + (remaining > 1 ? 's' : '') + ' to elaborate'
        : '⏳ Rank all drafts to elaborate';
      btn.disabled = true;
      btn.classList.toggle('visible', draftRanking.length > 0);
      if (!btn._bound) {
        btn._bound = true;
        btn.addEventListener('click', doElaborate);
      }
    }
  }

  async function doElaborate() {
    if (draftRanking.length !== drafts.length) return;

    const winnerIdx = draftRanking[0];
    const winner = drafts[winnerIdx];
    const reasonInput = draftContainer.querySelector('.draft-reasoning input');
    const reasoning = reasonInput ? reasonInput.value.trim() : '';

    const btn = draftContainer.querySelector('.elaborate-btn');
    btn.disabled = true;
    btn.textContent = '✨ ' + winner.profile + ' is elaborating…';
    btn.classList.remove('visible');

    // Disable cards
    draftContainer.querySelectorAll('.draft-card').forEach(c => c.style.pointerEvents = 'none');
    reasonInput.disabled = true;

    try {
      const r = await fetch(API + '/v1/elaborate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          interaction_id: draftInteractionId,
          winner_profile: winner.profile,
          all_drafts: drafts,
          user_reasoning: reasoning,
          messages: chatHistory
        })
      });
      if (!r.ok) { const err = await r.json().catch(() => ({})); throw new Error(err.error || 'Error ' + r.status); }
      const data = await r.json();
      const content = data.response || data.choices?.[0]?.message?.content || '(empty response)';
      const elabInteractionId = data.interaction_id || draftInteractionId;

      // Collapse draft view
      draftContainer.style.transition = 'opacity .3s, max-height .4s';
      draftContainer.style.opacity = '0';
      draftContainer.style.maxHeight = draftContainer.scrollHeight + 'px';
      setTimeout(() => {
        draftContainer.style.maxHeight = '0';
        draftContainer.style.overflow = 'hidden';
      }, 50);
      setTimeout(() => {
        draftContainer.remove();
        draftContainer = null;
        drafts = [];
        draftRanking = [];
      }, 400);

      // Show as assistant message with winner badge
      const row = document.createElement('div');
      row.className = 'msg-row assistant';
      if (elabInteractionId != null) row.dataset.interactionId = elabInteractionId;

      const metaWrap = document.createElement('div');
      metaWrap.style.marginBottom = '6px';
      const badge = document.createElement('span');
      badge.className = 'route-badge draft';
      badge.textContent = '🏆 ' + (winner.profile || 'draft');
      metaWrap.appendChild(badge);

      if (winner.model) {
        const metaDetails = document.createElement('div');
        metaDetails.className = 'route-meta';
        const modelEl = document.createElement('span');
        modelEl.className = 'route-model';
        modelEl.textContent = winner.model;
        metaDetails.appendChild(modelEl);
        metaWrap.appendChild(metaDetails);
      }
      row.appendChild(metaWrap);

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = fmtMd(content);
      row.appendChild(bubble);

      // Feedback
      if (elabInteractionId != null) {
        const fb = document.createElement('div');
        fb.className = 'msg-feedback';
        const upBtn = document.createElement('button');
        upBtn.className = 'fb-btn';
        upBtn.textContent = '👍';
        const downBtn = document.createElement('button');
        downBtn.className = 'fb-btn';
        downBtn.textContent = '👎';
        let activeThumb = null;

        upBtn.addEventListener('click', () => {
          if (activeThumb === 'up') return;
          if (activeThumb === 'down') { downBtn.textContent = '👎'; downBtn.classList.remove('active-down'); critique.classList.remove('visible'); }
          activeThumb = 'up';
          upBtn.textContent = '👍'; upBtn.classList.add('active-up');
          api('POST', '/v1/feedback', { interaction_id: Number(elabInteractionId), feedback: 'up' }).catch(() => {});
        });

        downBtn.addEventListener('click', () => {
          if (activeThumb === 'down') return;
          if (activeThumb === 'up') { upBtn.textContent = '👍'; upBtn.classList.remove('active-up'); }
          activeThumb = 'down';
          downBtn.textContent = '👎'; downBtn.classList.add('active-down');
          critique.classList.add('visible');
          critInput.focus();
          api('POST', '/v1/feedback', { interaction_id: Number(elabInteractionId), feedback: 'down' }).catch(() => {});
        });

        const critique = document.createElement('div');
        critique.className = 'fb-critique';
        const critInput = document.createElement('input');
        critInput.placeholder = 'What could be better?';
        const critBtn = document.createElement('button');
        critBtn.textContent = 'Submit';
        critBtn.addEventListener('click', () => {
          const t = critInput.value.trim();
          if (t) {
            api('POST', '/v1/feedback', { interaction_id: Number(elabInteractionId), feedback: 'down', critique: t }).catch(() => {});
          }
          critInput.value = '';
          critique.classList.remove('visible');
        });
        critInput.addEventListener('keydown', e => { if (e.key === 'Enter') critBtn.click(); });
        critique.append(critInput, critBtn);

        fb.append(upBtn, downBtn, critique);
        row.appendChild(fb);
      }

      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      row.appendChild(time);

      els.messages.appendChild(row);
      chatHistory.push({ role: 'assistant', content });

    } catch (e) {
      btn.textContent = 'Error: ' + e.message;
      btn.style.color = 'var(--error)';
      draftContainer.querySelectorAll('.draft-card').forEach(c => c.style.pointerEvents = '');
      const reasonInput2 = draftContainer.querySelector('.draft-reasoning input');
      if (reasonInput2) reasonInput2.disabled = false;
    } finally {
      sending = false;
      els.sendBtn.disabled = !els.input.value.trim();
      scrollDown();
    }
  }

  function hideEmpty() { if (els.emptyState.parentNode) els.emptyState.style.display = 'none'; }

  function addStatus(text) {
    const el = document.createElement('div');
    el.className = 'msg-status';
    el.textContent = text;
    els.messages.appendChild(el);
    return el;
  }

  function scrollDown() { requestAnimationFrame(() => { els.messages.scrollTop = els.messages.scrollHeight; }); }

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function fmtMd(text) {
    let h = esc(text);
    h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      return '<div class="code-block"><div class="code-header"><span>' + (lang || 'code') + '</span><button onclick="navigator.clipboard.writeText(decodeURIComponent(\'' + encodeURIComponent(code.trim()) + '\'));this.textContent=\'Copied!\'">Copy</button></div><pre><code class="block-code">' + code.trim() + '</code></pre></div>';
    });
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
    h = h.replace(/(?<!")\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    h = h.replace(/(?<!["(])(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    h = h.replace(/\n\n/g, '</p><p>');
    h = h.replace(/\n/g, '<br>');
    h = '<p>' + h + '</p>';
    h = h.replace(/<p><\/p>/g, '');
    return h;
  }

  if (token) showChat();
  else els.passphrase.focus();
})();
</script>
