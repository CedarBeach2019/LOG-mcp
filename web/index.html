<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LOG-mcp</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--surface-2:#1a1a28;
  --accent:#7c5cff;--accent-dim:#5a3fcc;
  --text:#e8e8f0;--text-muted:#8888a0;
  --user-bg:#7c5cff;--user-text:#fff;
  --asst-bg:#1a1a28;--asst-text:#e8e8f0;
  --border:#2a2a3a;--error:#ff4466;--success:#44dd88;
  --radius:16px;--radius-sm:10px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --mono:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── Login Screen ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  height:100%;padding:24px;
  background:radial-gradient(ellipse at 50% 40%,#16162a 0%,var(--bg) 70%);
}
.login-card{
  width:100%;max-width:380px;padding:48px 36px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.login-logo{
  width:56px;height:56px;margin:0 auto 20px;
  background:var(--accent);border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;color:#fff;font-weight:700;
  box-shadow:0 4px 24px rgba(124,92,255,.35);
}
.login-card h1{font-size:22px;font-weight:600;margin-bottom:6px}
.login-card p{color:var(--text-muted);font-size:14px;margin-bottom:32px}
#passphrase{
  width:100%;padding:14px 16px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-family:var(--font);font-size:15px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
#passphrase:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,.15)}
#passphrase::placeholder{color:var(--text-muted)}
#login-btn{
  width:100%;padding:14px;margin-top:16px;
  background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius-sm);font-size:15px;font-weight:600;
  cursor:pointer;transition:background .2s,transform .1s;
}
#login-btn:hover{background:var(--accent-dim)}
#login-btn:active{transform:scale(.98)}
#login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-error{color:var(--error);font-size:13px;margin-top:12px;min-height:20px}

/* ── Chat Screen ── */
#chat-screen{display:none;flex-direction:column;height:100%}
#chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#chat-header h1{font-size:17px;font-weight:600;display:flex;align-items:center;gap:10px}
.header-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0}
#logout-btn{
  background:none;border:1px solid var(--border);color:var(--text-muted);
  padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;
  font-family:var(--font);transition:all .2s;
}
#logout-btn:hover{border-color:var(--error);color:var(--error)}

/* ── Messages ── */
#messages{
  flex:1;overflow-y:auto;padding:20px;
  display:flex;flex-direction:column;gap:8px;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:6px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.msg-row{display:flex;max-width:85%;animation:msgIn .25s ease-out}
.msg-row.user{align-self:flex-end}
.msg-row.assistant{align-self:flex-start}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-bubble{
  padding:12px 16px;border-radius:var(--radius);
  font-size:14.5px;line-height:1.65;word-wrap:break-word;
  overflow-wrap:break-word;
}
.msg-row.user .msg-bubble{background:var(--user-bg);color:var(--user-text);border-bottom-right-radius:4px}
.msg-row.assistant .msg-bubble{background:var(--asst-bg);color:var(--asst-text);border-bottom-left-radius:4px}

.msg-time{
  font-size:11px;color:var(--text-muted);margin-top:4px;
  padding:0 4px;
}
.msg-row.user .msg-time{text-align:right}
.msg-row.assistant .msg-time{text-align:left}

/* Markdown in messages */
.msg-bubble p{margin:0 0 8px}
.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble strong{font-weight:600}
.msg-bubble a{color:#a78bfa;text-decoration:none}
.msg-bubble a:hover{text-decoration:underline}
.msg-bubble code:not(.block-code){
  background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;
  font-family:var(--mono);font-size:13px;
}
.code-block{
  background:#0d0d15;border:1px solid var(--border);
  border-radius:8px;margin:8px 0;overflow:hidden;
}
.code-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;background:rgba(255,255,255,.03);
  border-bottom:1px solid var(--border);font-size:12px;color:var(--text-muted);
}
.code-header button{
  background:none;border:none;color:var(--text-muted);cursor:pointer;
  font-size:12px;font-family:var(--font);
}
.code-header button:hover{color:var(--text)}
.code-block pre{
  padding:14px;margin:0;overflow-x:auto;
  font-family:var(--mono);font-size:13px;line-height:1.5;color:#c8c8e0;
}
.code-block pre::-webkit-scrollbar{height:4px}
.code-block pre::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Status line */
.msg-status{font-size:12px;color:var(--text-muted);font-style:italic;padding:4px 4px}

/* Empty state */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text-muted);text-align:center;gap:12px;padding:40px;
}
.empty-state .icon{font-size:40px;opacity:.4}
.empty-state p{font-size:14px;max-width:280px}

/* ── Input Area ── */
#input-area{
  padding:16px 20px;background:var(--surface);
  border-top:1px solid var(--border);flex-shrink:0;
}
#connection-label{
  font-size:11px;color:var(--text-muted);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
#connection-label .dot{width:6px;height:6px;border-radius:50%;background:var(--success)}
#input-wrap{
  display:flex;gap:10px;align-items:flex-end;
  max-width:720px;margin:0 auto;
}
#message-input{
  flex:1;padding:12px 16px;
  background:var(--surface-2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-family:var(--font);font-size:15px;outline:none;
  resize:none;min-height:44px;max-height:160px;line-height:1.5;
  transition:border-color .2s;
}
#message-input:focus{border-color:var(--accent)}
#message-input::placeholder{color:var(--text-muted)}
#send-btn{
  width:44px;height:44px;flex-shrink:0;
  background:var(--accent);color:#fff;border:none;
  border-radius:var(--radius-sm);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .1s,opacity .2s;
}
#send-btn:hover{background:var(--accent-dim)}
#send-btn:active{transform:scale(.93)}
#send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
#send-btn svg{width:20px;height:20px}

/* Footer */
#footer{
  text-align:center;padding:8px 20px 12px;
  font-size:11px;color:var(--text-muted);flex-shrink:0;
  opacity:.5;
}

/* Responsive */
@media(max-width:600px){
  .login-card{padding:36px 24px}
  .msg-row{max-width:92%}
  #chat-header{padding:12px 16px}
  #messages{padding:14px}
  #input-area{padding:12px 16px}
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">L</div>
    <h1>Welcome to LOG-mcp</h1>
    <p>Enter your passphrase to continue</p>
    <input type="password" id="passphrase" placeholder="Passphrase" autocomplete="off" autofocus>
    <button id="login-btn">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Chat Screen -->
<div id="chat-screen">
  <div id="chat-header">
    <h1><span class="header-dot"></span>LOG-mcp</h1>
    <button id="logout-btn">Sign out</button>
  </div>
  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">💬</div>
      <p>Start a conversation. Your messages are processed locally via LOG-mcp.</p>
    </div>
  </div>
  <div id="input-area">
    <div id="connection-label"><span class="dot"></span>Connected</div>
    <div id="input-wrap">
      <textarea id="message-input" placeholder="Type a message…" rows="1"></textarea>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
  <div id="footer">Powered by LOG-mcp</div>
</div>

<script>
(() => {
  const API = '';
  const $ = s => document.querySelector(s);
  const loginScreen = $('#login-screen');
  const chatScreen = $('#chat-screen');
  const passphraseInput = $('#passphrase');
  const loginBtn = $('#login-btn');
  const loginError = $('#login-error');
  const messagesEl = $('#messages');
  const emptyState = $('#empty-state');
  const messageInput = $('#message-input');
  const sendBtn = $('#send-btn');
  const logoutBtn = $('#logout-btn');
  const connLabel = $('#connection-label');

  let token = sessionStorage.getItem('token');
  let history = [];
  let sending = false;

  // Auto-resize textarea
  messageInput.addEventListener('input', () => {
    messageInput.style.height = 'auto';
    messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
    sendBtn.disabled = !messageInput.value.trim() || sending;
  });

  messageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);
  logoutBtn.addEventListener('click', () => {
    sessionStorage.removeItem('token');
    token = null;
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = '';
    chatScreen.style.display = 'none';
    loginScreen.style.display = '';
    passphraseInput.value = '';
    passphraseInput.focus();
  });

  loginBtn.addEventListener('click', doLogin);
  passphraseInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const pw = passphraseInput.value.trim();
    if (!pw) return;
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';
    loginError.textContent = '';
    try {
      const r = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ passphrase: pw })
      });
      if (!r.ok) throw new Error((await r.json()).error || 'Authentication failed');
      const { token: t } = await r.json();
      sessionStorage.setItem('token', t);
      token = t;
      showChat();
    } catch (e) {
      loginError.textContent = e.message;
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign in';
    }
  }

  function showChat() {
    loginScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    messageInput.focus();
  }

  async function send() {
    const text = messageInput.value.trim();
    if (!text || sending || !token) return;
    sending = true;
    sendBtn.disabled = true;
    messageInput.value = '';
    messageInput.style.height = 'auto';

    hideEmpty();
    addMessage('user', text);
    history.push({ role: 'user', content: text });

    // Show sending indicator
    const statusEl = addStatus('Sending…');
    scrollToBottom();

    try {
      const r = await fetch(API + '/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ model: 'default', messages: history })
      });
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.error || `Error ${r.status}`);
      }
      const data = await r.json();
      const content = data.choices?.[0]?.message?.content || '(empty response)';
      statusEl.remove();
      addMessage('assistant', content);
      history.push({ role: 'assistant', content });
    } catch (e) {
      statusEl.textContent = 'Error: ' + e.message;
      statusEl.style.color = 'var(--error)';
      statusEl.style.fontStyle = 'normal';
    } finally {
      sending = false;
      sendBtn.disabled = !messageInput.value.trim();
      scrollToBottom();
    }
  }

  function hideEmpty() {
    if (emptyState.parentNode) emptyState.style.display = 'none';
  }

  function addMessage(role, content) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = formatMarkdown(content);
    row.appendChild(bubble);

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    row.appendChild(time);

    messagesEl.appendChild(row);
    return row;
  }

  function addStatus(text) {
    const el = document.createElement('div');
    el.className = 'msg-status';
    el.textContent = text;
    messagesEl.appendChild(el);
    return el;
  }

  function scrollToBottom() {
    requestAnimationFrame(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  // Minimal markdown formatter
  function formatMarkdown(text) {
    // Escape HTML
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Code blocks
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
      const id = 'cb-' + Math.random().toString(36).slice(2, 8);
      return `<div class="code-block"><div class="code-header"><span>${lang || 'code'}</span><button onclick="navigator.clipboard.writeText(decodeURIComponent('${encodeURIComponent(code.trim())}'));this.textContent='Copied!'">Copy</button></div><pre id="${id}"><code class="block-code">${code.trim()}</code></pre></div>`;
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
    // Links
    html = html.replace(/(?<!")\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Bare URLs
    html = html.replace(/(?<!["(])(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    // Paragraphs
    html = html.replace(/\n\n/g, '</p><p>');
    html = html.replace(/\n/g, '<br>');
    html = '<p>' + html + '</p>';
    // Clean empty paragraphs
    html = html.replace(/<p><\/p>/g, '');

    return html;
  }

  // Init
  if (token) showChat();
  else passphraseInput.focus();
})();
</script>
</body>
</html>
